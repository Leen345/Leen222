<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قصتي تروى</title>
    <style>
    :root {
        --dark-blue: #0f172a;
        --card-bg: #1e293b;
        --accent-green: #22c55e;
        --text-white: #f8fafc;
        --yellow: #fbbf24;
        --red: #ef4444;
    }

    body {
        font-family: 'Cairo', sans-serif;
        background-color: var(--dark-blue);
        color: var(--text-white);
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        overflow-x: hidden;
    }

    /* تعديل الشاشة لتكون العناصر موزعة من الأعلى للأسفل */
    .screen { 
        display: none; 
        width: 100%; 
        max-width: 1000px; 
padding: 40px 20px;
        flex-direction: column; 
        align-items: center; 
        text-align: center; 
        min-height: 100vh; /* تأمين ارتفاع كافٍ */
		justify-content: center; /* هذا ما سينقل الأزرار لمنتصف الصفحة عمودياً */
    }
    
    .active { display: flex; }

    /* دفع العنوان لرأس الصفحة */
    h1 { 
        color: var(--accent-green); 
        font-size: 4rem; 
        margin-top: 20px; 
        margin-bottom: 50px; /* مسافة كبيرة تحت العنوان */
    }

    .content-box {
        background: var(--card-bg);
        padding: 30px;
        border-radius: 25px;
        width: 90%;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        margin-top: auto; /* يساعد في موازنة العناصر */
        margin-bottom: auto;
    }

    /* أزرار الواجهة الرئيسية الكبيرة */
    .home-grid .btn-main {
        height: 150px; /* زيادة الارتفاع */
        font-size: 1.8rem; /* تكبير الخط */
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 15px;
        border-radius: 25px;
        transition: transform 0.3s ease;
    }

    .home-grid .btn-main span {
        font-size: 3.5rem; /* تكبير الإيموجي */
    }

    .home-grid .btn-main:hover {
        transform: scale(1.05);
    }

    .btn-main {
        background: var(--accent-green);
        color: var(--dark-blue);
        border: none;
        padding: 18px;
        font-size: 1.3rem;
        font-weight: 900;
        border-radius: 15px;
        cursor: pointer;
        width: 100%;
        margin-top: 15px;
        box-shadow: 0 4px 0px #166534;
    }

    .btn-main:active { transform: translateY(4px); box-shadow: none; }
    .btn-red { background: var(--red); color: white; box-shadow: 0 4px 0px #991b1b; }
    .btn-yellow { background: var(--yellow); color: var(--dark-blue); box-shadow: 0 4px 0px #b45309; }

    input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: none; font-size: 1.1rem; }
    .story-text { font-size: 1.5rem; line-height: 1.8; margin-bottom: 25px; text-align: justify; }
</style>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
</head>

    function speak(txt, callback) {
        synth.cancel();
        let u = new SpeechSynthesisUtterance(txt);
        u.lang = 'ar-SA';
        u.rate = 0.9;
        if (callback) u.onend = callback;
        synth.speak(u);
    }

    function stopSpeech() { synth.cancel(); }

    if (!synth.speaking && document.getElementById('auth-screen').classList.contains('active')) {

    }

    function toggleAuthMode() {
        isSignUpMode = !isSignUpMode;
        document.getElementById('auth-title').innerText = isSignUpMode ? "إنشاء حساب جديد" : "تسجيل الدخول";
        document.getElementById('auth-btn').innerText = isSignUpMode ? "تسجيل" : "دخول";
        speak(isSignUpMode ? "أنت الآن في شاشة إنشاء حساب" : "أنت الآن في شاشة تسجيل الدخول");
    }

    function handleAuth() {
        const u = document.getElementById('username').value.trim();
        const p = document.getElementById('password').value.trim();
        if (!u || !p) { speak("الرجاء إدخال البيانات"); return; }

        if (isSignUpMode) {
            registeredUsers.push({user: u, pass: p});
            speak("تم إنشاء الحساب بنجاح. سجل دخولك الآن.");
			localStorage.setItem('myUsers', JSON.stringify(registeredUsers));
            toggleAuthMode();
        } else {
            const found = registeredUsers.find(x => x.user === u && x.pass === p);
            if (found) {
                showScreen('home-screen');
               speak("تم تسجيل الدخول بنجاح. أهلاً بك يا " + u + ". الشاشة الرئيسية تحتوي على ثلاثة أزرار: الزر الأول في اليمين لقواعد اللغة العربية، الزر الثاني في الوسط للمفضلات، والزر الثالث في اليسار لقصص الأطفال.");
            } else {
                speak("البيانات غير صحيحة. هل قمت بإنشاء حساب؟");
            }
        }
    }

    function runQuestion(index) {

    vocabData = stories[currentStory].vocab;

    }

    const q = vocabData[index];
    document.getElementById('quiz-question').innerText = `ما معنى ${q.word}؟`;
    const div = document.getElementById('quiz-options');
    div.innerHTML = "";
    
    let speech = `ما معنى كلمة ${q.word}؟ الخيارات هي: `;
    q.options.forEach((opt, i) => {

        div.innerHTML += `<button class="btn-main" onclick="checkAnswer(${index}, ${i})">خيار ${i+1}: ${opt}</button>`;

function startGrammarQuiz() {

function playGrammarContent() {

    const text = grammarLessons[currentGrammar].content;
    speak(text);
}
function runGrammarQuestion() {
    let currentQuiz = grammarLessons[currentGrammar].quiz;
    
    if (currentGrammarQ >= currentQuiz.length) {
        speak("رائع جداً! لقد أنهيت الاختبار بنجاح.", () => showScreen('grammar-menu-screen'));
        return;
    }

    const data = currentQuiz[currentGrammarQ];
    document.getElementById('g-quiz-question').innerText = data.q;
    const div = document.getElementById('g-quiz-options');
    div.innerHTML = "";

    let speech = `السؤال: ${data.q}. الخيارات هي: `;
    data.options.forEach((opt, i) => {
        speech += `الخيار ${i + 1}: ${opt}. `;
        div.innerHTML += `<button class="btn-main" onclick="checkGrammarAnswer(${i})">خيار ${i + 1}: ${opt}</button>`;
    });
    speak(speech);
}
function checkGrammarAnswer(selected) {
const correct = grammarLessons[currentGrammar].quiz[currentGrammarQ].correct;
    if (selected === correct) {
        speak("إجابة صحيحة! أحسنت يا بطل.", () => {
            currentGrammarQ++;
            runGrammarQuestion();
        });
    } else {
        speak("للأسف إجابة خاطئة، حاول مرة أخرى.");
    }
}
